# Ticketing System — full-stack orchestration.
#
# From a clean checkout, `docker compose up --build` at the repository root must
# bring up the whole solution with no host-installed Node/Postgres runtime
# (REQUIREMENTS §6, Definition of Done).
#
# The database and the Mailpit dev mail sink are defined here. The `backend` and
# `frontend` (nginx) services are added in ROADMAP-BE.md Phase 9 (backend
# Dockerfile + nginx proxy). Until then this file stands up PostgreSQL (for
# migrations + the locally-run backend) and Mailpit (to catch verification
# emails during development).

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ticketing}
    ports:
      # Published for local (host) development; inside compose services reach it
      # as host `db`.
      - '5432:5432'
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-ticketing}',
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Dev SMTP sink: catches every outgoing email so QA can read verification
  # links locally. Web UI on :8025, SMTP on :1025. Not a production mail server.
  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - '8025:8025' # web UI — open http://localhost:8025
      - '1025:1025' # SMTP endpoint the backend sends to

volumes:
  db-data:
