# Serves the compiled SPA and proxies the API to the backend container.
# Same-origin means the session cookie flows without any CORS configuration.
server {
    listen 80;
    server_name _;

    # API → backend service. Keep the /api prefix (the backend mounts there).
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA: serve built assets, fall back to index.html for client-side routes
    # (e.g. /board, /verify?token=…) so deep links and refreshes work.
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
